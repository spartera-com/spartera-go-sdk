          description: Schema/database name where the table resides
          example: Example Name
          type: string
        source_table_name:
          description: Table name to query from
          example: Example Name
          type: string
        customer_name:
          description: Named customer for B2B deals (marketplace uses price_credits
            instead)
          example: Example Name
          type: string
        price_usd:
          description: USD reference price for billing records and seller dashboards
          example: 5.0
          format: float
          type: number
