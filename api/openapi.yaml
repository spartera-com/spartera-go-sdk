          example: {}
          type: object
        status:
          description: "Current status of the endpoint (ACTIVE, INACTIVE, DEPRECATED)"
          enum:
          - ACTIVE
          - INACTIVE
          - DEPRECATED
          example: ACTIVE
          type: string
