components:
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object"
      description: Invalid input
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_1"
      description: Authentication required
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_2"
      description: Permission denied
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_3"
      description: Resource not found
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_4"
      description: "Resource conflict (duplicate, constraint violation)"
    UnprocessableEntity:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_5"
      description: Request well-formed but semantically invalid
    TooManyRequests:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_6"
      description: Rate limit exceeded
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object_7"
      description: Internal server error
  schemas:
    Alerts:
      description: A notification alert triggered when a subscribed asset is updated
      example:
        last_updated: 2025-04-01T00:00:00Z
        is_active: true
        company_id: company_id_abc123
        user_id: user_id_abc123
        date_created: 2025-04-01T00:00:00Z
        alert_id: 1
        asset_id: asset_id_abc123
      properties:
        date_created:
          description: Optional.
          example: 2025-04-01T00:00:00Z
          format: date-time
          type: string
        last_updated:
          description: Optional.
          example: 2025-04-01T00:00:00Z
          format: date-time
          type: string
        alert_id:
          description: Auto-generated unique identifier.
          example: 1
          format: int64
          type: integer
        asset_id:
          description: References assets.asset_id — A published analytics asset —
            a calculation or visualization built on a data connection. See GET /assets
            for valid values. Required.
          example: asset_id_abc123
          type: string
        user_id:
          description: References users.user_id — An individual user account within
            a company. See GET /users for valid values. Optional.
          example: user_id_abc123
          type: string
        company_id:
          description: References companies.company_id — A Spartera seller or buyer
            company account. See GET /companies for valid values. Required.
          example: company_id_abc123
          type: string
        is_active:
          description: Whether this alert is currently active
          example: true
          type: boolean
      required:
      - asset_id
      - company_id
      - is_active
    AlertsInput:
      description: Input schema for creating Alert
      example:
        is_active: true
        company_id: company_id_abc123
        user_id: user_id_abc123
        asset_id: asset_id_abc123
      properties:
        asset_id:
          description: References assets.asset_id — A published analytics asset —
            a calculation or visualization built on a data connection. See GET /assets
            for valid values. Required.
          example: asset_id_abc123
          type: string
        user_id:
          description: References users.user_id — An individual user account within
            a company. See GET /users for valid values. Optional.
          example: user_id_abc123
          type: string
        company_id:
          description: References companies.company_id — A Spartera seller or buyer
            company account. See GET /companies for valid values. Required.
          example: company_id_abc123
          type: string
        is_active:
          description: Whether this alert is currently active
          example: true
          type: boolean
      required:
      - asset_id
      - company_id
    AlertsUpdate:
      description: Update schema for modifying Alert
      example:
        is_active: true
        company_id: company_id_abc123
        user_id: user_id_abc123
        asset_id: asset_id_abc123
      properties:
        asset_id:
          description: References assets.asset_id — A published analytics asset —
            a calculation or visualization built on a data connection. See GET /assets
            for valid values. Required.
          example: asset_id_abc123
          type: string
        user_id:
          description: References users.user_id — An individual user account within
            a company. See GET /users for valid values. Optional.
          example: user_id_abc123
          type: string
        company_id:
          description: References companies.company_id — A Spartera seller or buyer
            company account. See GET /companies for valid values. Required.
          example: company_id_abc123
          type: string
        is_active:
          description: Whether this alert is currently active
          example: true
          type: boolean
    ApiKeys:
      description: API keys for authenticating requests to the Spartera platform
      example:
        last_updated: 2025-04-01T00:00:00Z
        company_id: company_id_abc123
        key_type: key_abc123
        expiration_date_utc: 2025-04-01T00:00:00Z
        user_id: user_id_abc123
        role_id: 1
