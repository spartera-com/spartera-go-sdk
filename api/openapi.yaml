          description: Comma-separated tags for organizing endpoints
          example: example_value
          type: string
        last_accessed:
          description: When this endpoint was last called
          example: 2025-04-01T00:00:00Z
          format: date-time
          type: string
        max_records_per_request:
          description: Seller-enforced row cap per request. Buyers cannot exceed this.
