          description: "Column configurations including aggregations, filters, and\
            \ visibility. Format: {columns: [{name, type, aggregation, filter, is_hidden,\
            \ alias, ...}]}. This is the source of truth — SQL is generated at runtime\
            \ from this configuration."
          example: {}
          type: object
        rate_limit_requests:
          description: Number of requests allowed per rate_limit_period
          example: 0.15
          format: int64
          type: integer
        rate_limit_period:
          description: "Time period for rate limiting (HOUR, DAY, MONTH)"
          enum:
          - SECOND
          - MINUTE
          - HOUR
          - DAY
          example: SECOND
          type: string
        rate_limit_granularity:
          description: "How to group rate limits (IP, USER, COMPANY, API_KEY, GLOBAL)"
          enum:
          - USER
          - COMPANY
          - IP
          - GLOBAL
          example: USER
          type: string
        access_method:
          description: "Access control method (OPEN, API_KEY, IP, EMAIL, DOMAIN)"
          enum:
          - OPEN
          - API_KEY
          - IP
          - EMAIL
          - DOMAIN
          example: OPEN
          type: string
        access_whitelist:
          description: "List of allowed IPs, emails, or domains based on access_method.\
