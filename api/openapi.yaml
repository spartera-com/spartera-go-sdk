          application/json:
            schema:
              $ref: "#/components/schemas/AssetsInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createAssetsAnalyze_200_response"
          description: Successfully created assets
          links:
            GetCreatedResource:
              description: Get the created assets
              operationId: getAssetsById
              parameters:
                asset_id: $response.body#/data/asset_id
            UpdateCreatedResource:
              description: Update the created assets
              operationId: updateAssets
              parameters:
                asset_id: $response.body#/data/asset_id
